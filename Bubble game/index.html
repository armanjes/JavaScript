<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble game</title>
    <!-- css link -->
    <link rel="stylesheet" href="style.css">
    <!-- fontawesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
        integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fab icon -->
    <link rel="shortcut icon" href="./media/foam.png" type="image/x-icon">
</head>

<body>
    <!-- -->
    <div id="main">
        <div id="panel">
            <div id="panel-top">
                <div class="panel-elem" id="hit">
                    <span class="panel-elem-text">Hit: </span>
                    <span class="panel-elem-box hits"></span>
                </div>

                <div class="panel-elem" id="time">
                    <span class="panel-elem-text ">Time: </span>
                    <span class="panel-elem-box time">60</span>
                </div>

                <div class="panel-elem" id="score">
                    <span class="panel-elem-text">Score: </span>
                    <span class="panel-elem-box score">0</span>
                </div>
            </div>

            <div id="panel-bottom"></div>

        </div>
        <p>all rights reseved by @arman</p>
    </div>
    <script src="./index.js"></script>
</body>

</html>
